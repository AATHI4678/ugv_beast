# =============================================================================
# UGV Rover hardware parameters — verified against Waveshare documentation
# Sources: https://www.waveshare.com/wiki/UGV_Rover_PI_ROS2
#          https://github.com/waveshareteam/ugv_base_ros
#          https://www.waveshare.com/wiki/UPS_Module_3S
# =============================================================================

motor_driver:
    ros__parameters:
        invert_drive: false
        serial_port: /dev/ttyAMA0 # udev symlink (see setup_pi.sh); fallback /dev/ttyAMA0
        baud_rate: 115200 # confirmed: Waveshare UGV Rover firmware uses 115200

        # ── Wheel geometry ────────────────────────────────────────────────────
        # wheel_radius confirmed: 0.05 m (100 mm diameter wheels)
        # wheel_base: 0.25 m (250 mm centre-to-centre track width)
        #   Note: some docs reference 0.30 m; measure your unit with a ruler.
        #   The 0.25 m value is from the Waveshare wiki dimensional drawing.
        wheel_base_m: 0.25
        wheel_radius_m: 0.04

        # ── Encoder ticks per revolution ──────────────────────────────────────
        # NOT published in Waveshare documentation. Must be calibrated.
        # UGV Rover uses Hall-effect encoders on geared DC motors.
        # Typical Waveshare gearmotors (DCGM3865 family): 11 PPR × 4 (quadrature)
        # × gear_ratio. Gear ratio is not published.
        #
        # CALIBRATE THIS VALUE before deploying:
        #   1. ros2 launch ugv_base ugv_base.launch.py
        #   2. Send a 1.0 m/s forward command for exactly 1 second (= 1 m travel)
        #   3. ros2 topic echo /wheel/odom --once
        #   4. If pose.pose.position.x reads 0.8, multiply ticks_per_rev by (1.0/0.8)
        #
        # 1560 is a reasonable starting estimate for a common 3.7:1 gearbox
        # with 11 PPR × 4 (quadrature) = 44 × 35.5 ≈ 1562, but verify.
        ticks_per_rev: 1560

        max_speed_mps: 1.3 # confirmed: UGV Rover hardware limit ~0.35 m/s
        cmd_vel_timeout_s:
            0.5 # ESP32 firmware has a 3-second internal timeout;
            # our 0.5 s is intentionally tighter for safety
        publish_tf: false
        odom_frame: odom
        base_frame: base_link
        sim_mode: false

        # ── Robot IMU (ICM-20948 on ESP32 board via UART) ─────────────────────
        # IMU chip: ICM-20948 (9-axis: accel + gyro + magnetometer)
        # Confirmed via Waveshare firmware using Adafruit_ICM20948 library.
        # The ICM-20948 includes a Digital Motion Processor (DMP) capable of
        # outputting quaternions. Whether the UGV Rover firmware enables DMP
        # depends on the firmware version — check your ESP32 firmware source.
        #
        # imu_has_orientation: true  if firmware sends qw/qx/qy/qz (DMP enabled)
        # imu_has_orientation: false if firmware sends raw accel + gyro only
        imu_frame_id: imu_link
        imu_has_orientation: false # set true if your ESP32 firmware enables ICM-20948 DMP

        # ICM-20948 noise characteristics (from TDK datasheet DS-000189):
        #   Accel noise density: 230 μg/√Hz → at 100 Hz: 230e-6 × 9.81 × √100 ≈ 0.023 m/s²
        #   Gyro noise density:  15 mdps/√Hz → at 100 Hz: 0.015 × π/180 × √100 ≈ 0.0026 rad/s
        # Variance = noise² (conservative 2× safety factor applied):
        imu_accel_variance: 0.001 # (m/s²)²  — ICM-20948 is significantly better than MPU6050
        imu_gyro_variance: 0.01 # (rad/s)²
        imu_orientation_variance: 0.005 # (rad)² — only used when imu_has_orientation: true
        imu_gyro_bias_z: 0.00208 #Corrected the bias.

battery_monitor:
    ros__parameters:
        # UPS Module 3S confirmed specs (https://www.waveshare.com/wiki/UPS_Module_3S):
        #   Chemistry: Li-ion 18650, 3S configuration
        #   Full charge: 12.6 V (4.2 V × 3 cells)
        #   Nominal:     11.1 V (3.7 V × 3 cells)
        #   Cutoff:       9.0 V (3.0 V × 3 cells)
        #   Monitoring:  INA219 over I2C (address 0x40)
        warn_percent: 20.0
        low_percent: 15.0
        critical_percent: 10.0
        publish_rate_hz: 1.0
        # INA219 is wired to the Pi's I2C bus on the UPS Module 3S.
        # Set use_i2c: true to read it directly from the Pi.
        use_i2c: true
        i2c_address: 0x40 # INA219 default address on UPS Module 3S

teleop_watchdog:
    ros__parameters:
        teleop_timeout_s: 2.0
        max_teleop_speed_mps: 0.35
        max_teleop_yaw_rps: 1.0
