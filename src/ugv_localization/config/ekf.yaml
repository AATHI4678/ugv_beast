# ---------------------------------------------------------------------------
# navsat_transform_node
# Converts /gps/fix (lat/lon) → /odometry/gps (map-frame XY Odometry)
# ---------------------------------------------------------------------------
navsat_transform_node:
    ros__parameters:
        frequency: 30.0
        delay: 3.0

        # *** CRITICAL: look up your location at ngdc.noaa.gov/geomag ***
        # Example: Innisfil, ON, Canada ≈ -10.5° = -0.1833 rad
        magnetic_declination_radians: -0.1833

        yaw_offset: 0.0
        zero_altitude: true
        broadcast_utm_transform: true
        broadcast_utm_transform_as_parent_frame: false
        publish_filtered_gps: true
        use_odometry_yaw: false # use IMU yaw, not GPS course-over-ground
        wait_for_datum: false
