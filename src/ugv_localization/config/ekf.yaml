# ---------------------------------------------------------------------------
# GLOBAL EKF: map frame
# GPS-corrected absolute position for Nav2's global planner.
# Fuses: wheel odometry + robot IMU + GPS position + GPS velocity
# ---------------------------------------------------------------------------
ekf_filter_node_map:
    ros__parameters:
        frequency: 15.0
        sensor_timeout: 0.1
        two_d_mode: true
        publish_tf: true
        publish_acceleration: false

        map_frame: map
        odom_frame: odom
        base_link_frame: base_link
        world_frame: map # GLOBAL EKF publishes map → odom

        # --- Wheel odometry ---
        odom0: /wheel/odom
        odom0_config:
            [
                false,
                false,
                false,
                false,
                false,
                false,
                true,
                false,
                false,
                false,
                false,
                true,
                false,
                false,
                false,
            ]
        odom0_queue_size: 10
        odom0_differential: false
        odom0_relative: false

        # --- Robot IMU ---
        imu0: /imu/data
        imu0_config:
            [
                false,
                false,
                false,
                false,
                false,
                true,
                false,
                false,
                false,
                false,
                false,
                true,
                true,
                false,
                false,
            ]
        imu0_queue_size: 10
        imu0_differential: false
        imu0_relative: false
        imu0_remove_gravitational_acceleration: true

        # --- GPS position (lat/lon → map XY via navsat_transform) ---
        odom1: /odometry/gps
        odom1_config:
            [
                true,
                true,
                false,
                false,
                false,
                false,
                false,
                false,
                false,
                false,
                false,
                false,
                false,
                false,
                false,
