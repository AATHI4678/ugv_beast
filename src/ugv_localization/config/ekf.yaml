# =============================================================================
# Dual EKF configuration — robot onboard IMU + wheel odometry + phone GPS
#
# IMU source change: IMU now comes from the robot's ESP32 (UART serial),
# NOT from the phone app. This gives:
#   - Lower latency (~1 ms UART vs 10–50 ms WiFi)
#   - No dependency on phone WiFi for IMU data
#   - Fixed, known mounting frame (no phone orientation ambiguity)
#   - Gravity included in acceleration (EKF removes it via flag below)
#
# Sensor roles:
#   /imu/data    → robot IMU via ESP32 UART (motor_driver node)
#   /wheel/odom  → encoder odometry via ESP32 UART (motor_driver node)
#   /gps/fix     → phone GPS via WebSocket (phone_sensor_bridge node)
#   /odometry/gps → navsat_transform output: lat/lon → map XY (global EKF)
#
# Key differences from phone-IMU config:
#   imu0_relative: false          — robot IMU is rigidly mounted; absolute orientation valid
#   imu0_remove_gravitational_acceleration: true  — robot IMU includes gravity
#   sensor_timeout: 0.1           — UART is reliable; short timeout catches real failures
#   imu0_queue_size: 10           — UART is low-jitter; smaller buffer is fine
#   Tighter process noise on yaw  — robot IMU gyro is more stable than phone WiFi stream
# =============================================================================

# ---------------------------------------------------------------------------
# LOCAL EKF: odom frame
# Smooth, continuous odometry for Nav2's local planner.
# Fuses: wheel odometry + IMU angular velocity + IMU linear acceleration
# GPS deliberately excluded: GPS jumps cause lurching in local planner.
# ---------------------------------------------------------------------------
ekf_filter_node_odom:
    ros__parameters:
        frequency: 15.0
        sensor_timeout: 0.1 # UART is reliable; 100ms timeout detects real failures
        two_d_mode: true
        transform_time_offset: 0.0
        transform_timeout: 0.0
        print_diagnostics: true
        debug: false
        publish_tf: true
        publish_acceleration: false

        map_frame: map
        odom_frame: odom
        base_link_frame: base_link
        world_frame: odom # LOCAL EKF publishes odom → base_link

        # --- Wheel odometry ---
        # State vector indices:
        #   [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
        odom0: /wheel/odom
        odom0_config: [
                false,
                false,
                false, # x, y, z
                false,
                false,
                false, # roll, pitch, yaw
                true,
                false,
                false, # vx (forward speed)
                false,
                false,
                true, # vyaw (angular rate)
                false,
                false,
                false,
            ] # acceleration
        odom0_queue_size: 10
        odom0_differential: false
        odom0_relative: false

        # --- Robot IMU (ESP32 UART) ---
        imu0: /imu/data
        imu0_config: [
                false,
                false,
                false, # position — never fuse IMU position
                false,
                false,
                true, # yaw — use if imu_has_orientation: true
                # ignored automatically if orientation_covariance[0]==-1
                false,
                false,
                false, # velocity — wheel odom provides this
                false,
                false,
                true, # vyaw — gyro yaw rate (always available)
                true,
                false,
                false,
            ] # ax — forward acceleration
        imu0_queue_size: 10 # UART is low-jitter; small buffer is fine
        imu0_differential: false
        imu0_relative: false # robot IMU is fixed mount; not relative
        # Robot IMU reports acceleration WITH gravity included.
        # robot_localization will subtract 9.81 m/s² from the Z axis before fusing.
        imu0_remove_gravitational_acceleration: true

        process_noise_covariance:
            [
