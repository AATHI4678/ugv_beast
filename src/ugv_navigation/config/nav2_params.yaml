# =============================================================================
# Nav2 outdoor configuration for UGV Rover delivery robot
#
# Key outdoor differences from default indoor config:
#   - rolling_window: true on both costmaps (no static map)
#   - Generous inflation radius (GPS jitter ≈ 1-3m)
#   - /scan_filtered as observation source (post laser_filters)
#   - MPPI controller for smooth sidewalk following
#   - Wider goal tolerance (GPS accuracy)
#   - Recovery behaviours tuned for outdoor open spaces
# =============================================================================

amcl:
    # AMCL is NOT used (no static map). Localization comes from dual EKF.
    ros__parameters:
        use_sim_time: false

bt_navigator:
    ros__parameters:
        use_sim_time: false
        global_frame: map
        robot_base_frame: base_link
        odom_topic: /odometry/local # smooth local odometry for BT navigation
        bt_loop_duration: 10
        default_server_timeout: 20
        wait_for_service_timeout: 1000
        action_server_result_timeout: 900.0
        navigators: ["navigate_to_pose", "navigate_through_poses"]
        navigate_to_pose:
            plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
        navigate_through_poses:
            plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
        # Default BT handles most delivery scenarios. Custom BT in config/nav2_bt.xml
        # default_nav_to_pose_bt_xml: ""
        # default_nav_through_poses_bt_xml: ""

controller_server:
    ros__parameters:
        use_sim_time: false
        controller_frequency: 5.0 # 10 Hz sufficient for 0.35 m/s outdoors
        min_x_velocity_threshold: 0.001
        min_y_velocity_threshold: 0.5 # diff-drive: no lateral motion
        min_theta_velocity_threshold: 0.001
        failure_tolerance: 0.3
        progress_checker_plugins: ["progress_checker"]
        goal_checker_plugins: ["general_goal_checker"]
        controller_plugins: ["FollowPath"]
        odom_topic: /odometry/local

        progress_checker:
            plugin: "nav2_controller::SimpleProgressChecker"
            required_movement_radius: 0.3
            movement_time_allowance: 15.0 # generous for outdoor GPS uncertainty

        general_goal_checker:
            stateful: true
            plugin: "nav2_controller::SimpleGoalChecker"
            xy_goal_tolerance: 2.0 # 2 m tolerance matches ~1-3m GPS accuracy
            yaw_goal_tolerance: 0.5 # ~30 degrees; delivery robot doesn't need exact heading

        FollowPath:
            plugin: "nav2_mppi_controller::MPPIController"
            time_steps: 40
            model_dt: 0.2
            batch_size: 500 # reduced from 2000 for Pi 4B CPU budget
            ax_max: 0.5 # m/s²; gentle acceleration for stability
            ax_min: -0.5
            ay_max: 0.5
            az_max: 1.5
            vx_std: 0.2
            vy_std: 0.0 # diff-drive: no lateral velocity
            wz_std: 0.4
            vx_max: 0.65 # slightly below hardware max for safety margin
            vx_min: -0.10 # allow small reverse for recovery
            vy_max: 0.0
            wz_max: 1.0
            iteration_count: 1
            prune_distance: 2.0
            transform_tolerance: 0.3
            temperature: 0.3
            gamma: 0.015
            motion_model: "DiffDrive"
            visualize: false # disable on Pi to save CPU
            reset_period: 1.0
            regenerate_noisy_trajectories_for_resampling: true
            critics:
                [
                    "ConstraintCritic",
                    "CostCritic",
                    "GoalCritic",
                    "GoalAngleCritic",
                    "PathAlignCritic",
                    "PathFollowCritic",
                    "PathAngleCritic",
                    "PreferForwardCritic",
                ]
            ConstraintCritic:
                enabled: true
                cost_power: 1
                cost_weight: 4.0
            GoalCritic:
                enabled: true
                cost_power: 1
                cost_weight: 5.0
                threshold_to_consider: 1.4
            GoalAngleCritic:
                enabled: true
                cost_power: 1
                cost_weight: 3.0
                threshold_to_consider: 0.5
            PreferForwardCritic:
                enabled: true
                cost_power: 1
                cost_weight: 5.0
                threshold_to_consider: 0.5
            CostCritic:
                enabled: true
                cost_power: 1
                cost_weight: 8.0
                critical_cost: 300.0
                consider_footprint: true
                collision_cost: 1e6
                near_goal_smoothing_factor: 0.1
            PathAlignCritic:
                enabled: true
                cost_power: 1
                cost_weight: 14.0
                max_path_occupancy_ratio: 0.05
                trajectory_point_step: 3
                threshold_to_consider: 0.5
                offset_from_furthest: 20
                use_path_orientations: false
            PathFollowCritic:
                enabled: true
                cost_power: 1
                cost_weight: 5.0
                offset_from_furthest: 5
                threshold_to_consider: 1.4
            PathAngleCritic:
                enabled: true
                cost_power: 1
                cost_weight: 2.0
                offset_from_furthest: 4
                threshold_to_consider: 0.5
                max_angle_to_furthest: 1.0
                mode: 0

local_costmap:
    local_costmap:
        ros__parameters:
            use_sim_time: false
            update_frequency: 10.0
            publish_frequency: 5.0
            global_frame: odom
            robot_base_frame: base_link
            rolling_window: true
            # width: 8
            # height: 8
            # resolution: 0.1 # 10 cm per cell; trade-off: detail vs CPU
            # New costmap as of 21/05/2026
            width: 6
            height: 6
            resolution: 0.1
            # robot_radius: 0.30 # UGV Rover approximate inscribed radius
            # Explicit footprint alternative (more accurate):
            footprint: "[[0.15, 0.15], [0.15, -0.15], [-0.15, -0.15], [-0.15, 0.15]]"
            plugins: ["obstacle_layer", "inflation_layer"]
            obstacle_layer:
                plugin: "nav2_costmap_2d::ObstacleLayer"
                enabled: true
                observation_sources: scan_filtered
                scan_filtered:
                    topic: /scan_filtered
                    max_obstacle_height: 2.0
                    clearing: true
                    marking: true
                    data_type: "LaserScan"
                    raytrace_max_range: 7.0 # clear free space up to 7m
                    raytrace_min_range: 0.0
                    obstacle_max_range: 6.0 # mark obstacles up to 6m
                    obstacle_min_range: 0.0
            inflation_layer:
                plugin: "nav2_costmap_2d::InflationLayer"
                inflation_radius: 0.40
                cost_scaling_factor: 3.0 # generous: absorbs GPS jitter + robot radius

            always_send_full_costmap: true

global_costmap:
    global_costmap:
        ros__parameters:
            use_sim_time: false
            update_frequency: 1.0 # global planner doesn't need high update rate
            publish_frequency: 1.0
            global_frame: map
            robot_base_frame: base_link
            rolling_window: true # CRITICAL for outdoor: no pre-built map
            width: 60
            height: 60
            resolution: 0.2 # 20 cm per cell; larger map needs coarser cells
            # robot_radius: 0.30
            footprint: "[[0.15, 0.15], [0.15, -0.15], [-0.15, -0.15], [-0.15, 0.15]]"
            track_unknown_space: false # treat unknown as free outdoors
            plugins: ["obstacle_layer", "inflation_layer"]
            obstacle_layer:
                plugin: "nav2_costmap_2d::ObstacleLayer"
                enabled: true
                observation_sources: scan_filtered
                scan_filtered:
                    topic: /scan_filtered
                    max_obstacle_height: 2.0
                    clearing: true
                    marking: true
                    data_type: "LaserScan"
                    raytrace_max_range: 7.0
                    raytrace_min_range: 0.0
                    obstacle_max_range: 6.0
                    obstacle_min_range: 0.0
            inflation_layer:
                plugin: "nav2_costmap_2d::InflationLayer"
                inflation_radius: 0.50
                cost_scaling_factor: 3.0

            always_send_full_costmap: false

map_server:
    ros__parameters:
        use_sim_time: false
        # No static map for outdoor GPS navigation.
        # map_server is launched but serves an empty map; costmaps use rolling window.
        yaml_filename: ""

map_saver:
    ros__parameters:
        use_sim_time: false
        save_map_timeout: 5.0
        free_thresh_default: 0.25
        occupied_thresh_default: 0.65

planner_server:
    ros__parameters:
        use_sim_time: false
        planner_plugins: ["GridBased"]
        GridBased:
            plugin: "nav2_navfn_planner::NavfnPlanner"
            tolerance: 2.0 # matches GPS accuracy
            use_astar: false
            allow_unknown: true # plan through unknown space (outdoor)

smoother_server:
    ros__parameters:
        use_sim_time: false
        smoother_plugins: ["simple_smoother"]
        simple_smoother:
            plugin: "nav2_smoother::SimpleSmoother"
            tolerance: 1.0e-10
            max_its: 1000
            do_refinement: true

behavior_server:
    ros__parameters:
        use_sim_time: false
        local_costmap_topic: local_costmap/costmap_raw
        local_footprint_topic: local_costmap/published_footprint
        global_costmap_topic: global_costmap/costmap_raw
        global_footprint_topic: global_costmap/published_footprint
        cycle_frequency: 10.0
        behavior_plugins:
            ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
        spin:
            plugin: "nav2_behaviors::Spin"
        backup:
            plugin: "nav2_behaviors::BackUp"
        drive_on_heading:
            plugin: "nav2_behaviors::DriveOnHeading"
        wait:
            plugin: "nav2_behaviors::Wait"
        assisted_teleop:
            plugin: "nav2_behaviors::AssistedTeleop"
        local_frame: odom
        global_frame: map
        robot_base_frame: base_link
        transform_tolerance: 0.3
        simulate_ahead_time: 2.0
        max_rotational_vel: 1.0
        min_rotational_vel: 0.4
        rotational_acc_lim: 1.0

waypoint_follower:
    ros__parameters:
        use_sim_time: false
        loop_rate: 20
        stop_on_failure: false # continue to next waypoint if one fails
        action_server_result_timeout: 900.0
        waypoint_task_executor_plugin: "wait_at_waypoint"
        wait_at_waypoint:
            plugin: "nav2_waypoint_follower::WaitAtWaypoint"
            enabled: true
            waypoint_pause_duration: 3 # seconds to pause at each waypoint

velocity_smoother:
    ros__parameters:
        use_sim_time: false
        smoothing_frequency: 20.0
        scale_velocities: false
        feedback: "OPEN_LOOP"
        max_velocity: [0.45, 0.0, 1.0]
        min_velocity: [-0.10, 0.0, -1.0]
        max_accel: [0.5, 0.0, 1.5]
        max_decel: [-0.5, 0.0, -1.5]
        odom_topic: /odometry/local
        odom_duration: 0.1
        deadband_velocity: [0.0, 0.0, 0.0]
        velocity_timeout: 1.0

collision_monitor:
    ros__parameters:
        use_sim_time: false
        base_frame_id: base_link
        odom_frame_id: odom
        cmd_vel_in_topic: cmd_vel_smoothed
        cmd_vel_out_topic: /cmd_vel/nav2
        state_topic: collision_monitor_state
        transform_tolerance: 0.3
        source_timeout: 1.0
        base_shift_correction: true
        stop_pub_timeout: 2.0
        polygons: ["PolygonStop", "PolygonSlow"]
        PolygonStop:
            type: "polygon"
            points: "[[0.35, 0.30], [0.35, -0.30], [-0.35, -0.30], [-0.35, 0.30]]"
            action_type: "stop"
            min_points: 8
            # visualize: false
            visualize: true
            polygon_pub_topic: "polygon_stop"
        PolygonSlow:
            type: "polygon"
            points: "[[0.55, 0.40], [0.55, -0.40], [-0.25, -0.40], [-0.25, 0.40]]"
            action_type: "slowdown"
            slowdown_ratio: 0.5
            min_points: 12
            # visualize: false
            visualize: true
            polygon_pub_topic: "polygon_slow"
        observation_sources: ["scan"]
        scan:
            type: "scan"
            topic: /scan_filtered
