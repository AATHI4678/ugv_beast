# =============================================================================
# Outdoor laser filter chain for RPLIDAR C1
# Pipeline: /scan → [range] → [shadows] → [speckle] → /scan_filtered
# ROS 2 format: filter chain is a MAP of filter1/filter2/... keys (not a list).
# =============================================================================

scan_filter_chain:
    ros__parameters:
        # 1. Range filter — drop returns outside [lower, upper] metres
        filter1:
            name: range
            type: laser_filters/LaserScanRangeFilter
            params:
                use_message_range_limits: false
                lower_threshold: 0.15
                upper_threshold: 8.0
                lower_replacement_value: -.inf
                upper_replacement_value: .inf
        filter2:
            name: speckle
            type: laser_filters/LaserScanSpeckleFilter
            params:
                filter_type: 0
                max_range: 8.0
                max_range_difference: 0.7
                filter_window: 2
